        :root {

        .slide-container {

        }
        /* The body class "vibe-transition-fade" triggers this transition */
        .vibe-transition-fade .slide {

        /* <!-- VIBE_TRANSITIONS_END --> */
        /* <!-- VIBE_ANIMATIONS_START -->

        @keyframes vibe-float {

        }
        .vibe-anim-float { animation: vibe-float 4s ease-in-out infinite; }
        @keyframes vibe-glow {
            from { text-shadow: 0 0 10px var(--vibe-primary); }

        }
        .vibe-anim-glow { animation: vibe-glow 2s ease-in-out infinite alternate; }
        /* <!-- VIBE_ANIMATIONS_END --> */
        body, html {
            background-color: #000;

            width: 100%; height: 100%;
            overflow: hidden;
            font-family: var(--vibe-font);
        }
        .slide-container {

            overflow-y: auto; overflow-x: hidden;
        }
        .slide {
            width: 100vw; height: 100vh;
            scroll-snap-align: start;
            display: flex; justify-content: center; align-items: center;
            background-color: var(--vibe-bg);
            position: relative;
        }
        .slide-aspect-ratio-box {

            color: var(--vibe-text);
            position: relative;
            flex-shrink: 0;
            transform: scale(var(--vibe-scale));
            transform-origin: center center;
            padding: 80px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            backface-visibility: hidden;
        }
    </style>

    <!-- VIBE_MANIFEST_END: Do not add app logic here. This block is for manifest data only. -->
    <script>
        // Read-only engine runtime below. Edit only if you are intentionally changing navigation behavior.
        const container = document.getElementById('vibe-deck');
        let activeSlideIndex = 0;
        let settleTimer = null;
        let isProgrammaticScroll = false;
        function updateScale() {
            const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            document.documentElement.style.setProperty('--vibe-scale', scale);
        }
        function getSlideCount() {
            return container ? container.querySelectorAll('.slide').length : 0;
        }
        function clampSlideIndex(index) {
            const maxIndex = Math.max(0, getSlideCount() - 1);
            return Math.max(0, Math.min(index, maxIndex));
        }
        function goToSlide(index, behavior = 'smooth') {
            if (!container) return;
            const clamped = clampSlideIndex(index);
            activeSlideIndex = clamped;
            isProgrammaticScroll = true;
            container.scrollTo({ top: clamped * window.innerHeight, behavior });
            window.setTimeout(() => { isProgrammaticScroll = false; }, 450);
        }
        function nextSlide() {
            goToSlide(activeSlideIndex + 1);
        }
        function prevSlide() {
            goToSlide(activeSlideIndex - 1);
        }
        function settleSlideFromScroll() {
            if (!container) return;
            const observedIndex = Math.round(container.scrollTop / window.innerHeight);
            const maxStepDown = activeSlideIndex + 1;
            const maxStepUp = activeSlideIndex - 1;
            const oneStepIndex = Math.max(maxStepUp, Math.min(maxStepDown, observedIndex));
            goToSlide(oneStepIndex);
        }
        if (container) {
            container.addEventListener('scroll', () => {
                if (isProgrammaticScroll) return;
                if (settleTimer) clearTimeout(settleTimer);
                settleTimer = window.setTimeout(settleSlideFromScroll, 120);
            }, { passive: true });
        }
        window.addEventListener('resize', () => {
            updateScale();
            goToSlide(activeSlideIndex, 'auto');
        });
        window.addEventListener('load', () => {
            updateScale();
            goToSlide(0, 'auto');
        });
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowDown' || e.key === ' ') {
                e.preventDefault();
                nextSlide();
            }
            if (e.key === 'ArrowUp') {
                e.preventDefault();
                prevSlide();
            }
        });
        updateScale();
        goToSlide(0, 'auto');
    </script>
